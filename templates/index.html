<!DOCTYPE html>
<html>
<head>
<title>OptionGuru PRO</title>

<style>
body {
    background:#0b0f19;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.box {
    background:#111827;
    margin:10px;
    padding:15px;
    border-radius:10px;
    width:180px;
}

.btn {
    padding:10px 15px;
    margin:5px;
    background:#00c853;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover {
    background:#009624;
}
</style>
</head>

<body>

<h1>🚀 OptionGuru PRO</h1>

<div class="container">
    <div id="niftyBox" class="box">Loading...</div>
    <div id="bankBox" class="box">Loading...</div>
    <div id="sensexBox" class="box">Loading...</div>
    <div id="finBox" class="box">Loading...</div>
    <div id="midBox" class="box">Loading...</div>
</div>

<!-- Buttons -->
<div>
    <button class="btn" onclick="loadChart('NSE:NIFTY')">NIFTY</button>
    <button class="btn" onclick="loadChart('NSE:BANKNIFTY')">BANKNIFTY</button>
    <button class="btn" onclick="loadChart('BSE:SENSEX')">SENSEX</button>
    <button class="btn" onclick="loadChart('NSE:FINNIFTY')">FINNIFTY</button>
    <button class="btn" onclick="loadChart('NSE:MIDCPNIFTY')">MIDCAP</button>
</div>

<!-- Chart -->
<div id="tradingview_chart" style="height:500px; margin-top:20px;"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
function loadChart(symbol) {
    document.getElementById("tradingview_chart").innerHTML = "";

    new TradingView.widget({
        "width": "100%",
        "height": 500,
        "symbol": symbol,
        "interval": "5",
        "timezone": "Asia/Kolkata",
        "theme": "dark",
        "style": "1",
        "container_id": "tradingview_chart"
    });
}

// Default Chart
loadChart("NSE:NIFTY");

// 🔥 Signal Color
function color(signal){
    return signal === "BUY" ? "lime" : "red";
}

// 🔥 Fetch Data
async function fetchData() {
    let nifty = await fetch('/nifty').then(res=>res.json());
    let bank = await fetch('/banknifty').then(res=>res.json());
    let sensex = await fetch('/sensex').then(res=>res.json());
    let fin = await fetch('/finnifty').then(res=>res.json());
    let mid = await fetch('/midcap').then(res=>res.json());

    document.getElementById("niftyBox").innerHTML =
    `NIFTY<br>
    Price: ${nifty.price}<br>
    <span style="color:${color(nifty.signal)}">${nifty.signal}</span><br>
    SL: ${nifty.sl} | Target: ${nifty.target}`;

    document.getElementById("bankBox").innerHTML =
    `BANKNIFTY<br>
    Price: ${bank.price}<br>
    <span style="color:${color(bank.signal)}">${bank.signal}</span><br>
    SL: ${bank.sl} | Target: ${bank.target}`;

    document.getElementById("sensexBox").innerHTML =
    `SENSEX<br>
    Price: ${sensex.price}<br>
    <span style="color:${color(sensex.signal)}">${sensex.signal}</span><br>
    SL: ${sensex.sl} | Target: ${sensex.target}`;

    document.getElementById("finBox").innerHTML =
    `FINNIFTY<br>
    Price: ${fin.price}<br>
    <span style="color:${color(fin.signal)}">${fin.signal}</span><br>
    SL: ${fin.sl} | Target: ${fin.target}`;

    document.getElementById("midBox").innerHTML =
    `MIDCAP<br>
    Price: ${mid.price}<br>
    <span style="color:${color(mid.signal)}">${mid.signal}</span><br>
    SL: ${mid.sl} | Target: ${mid.target}`;
}

// 🔄 Auto Refresh
setInterval(fetchData, 5000);
fetchData();
</script>

</body>
</html>
