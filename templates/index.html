<!DOCTYPE html>
<html>
<head>
<title>OptionGuru Trader</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {background:#0d1117;color:white;text-align:center;}
.card {background:#161b22;padding:15px;margin:10px;border-radius:10px;width:260px;}
.container {display:flex;flex-wrap:wrap;justify-content:center;}
</style>
</head>

<body>

<h1>💰 OptionGuru TRADER MODE</h1>

<div class="container">
<div class="card"><h3>NIFTY</h3><div id="nifty"></div></div>
<div class="card"><h3>BANKNIFTY</h3><div id="bank"></div></div>
<div class="card"><h3>SENSEX</h3><div id="sensex"></div></div>
<div class="card"><h3>FINNIFTY</h3><div id="fin"></div></div>
<div class="card"><h3>MIDCAP</h3><div id="mid"></div></div>
</div>

<div id="chart" style="height:500px;"></div>

<script>

new TradingView.widget({
  "symbol": "NSE:NIFTY",
  "interval": "5",
  "theme": "dark",
  "container_id": "chart"
});

let lastSignal = {};

function alertUser(name,msg){
    if(msg.includes("STRONG")){
        let audio = new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3");
        audio.play();
        alert(name + " " + msg);
    }
}

function format(x,name){

    if(lastSignal[name] && lastSignal[name] != x.signal){
        alertUser(name,x.signal);
    }

    lastSignal[name] = x.signal;

    return `
    ${x.signal}<br>
    ${x.prediction}<br><br>
    Entry: ${x.entry}<br>
    SL: ${x.sl}<br>
    Target: ${x.target}<br><br>
    Support: ${x.support}<br>
    Resistance: ${x.resistance}
    `;
}

async function load(){

    let n = await fetch("/nifty").then(r=>r.json());
    let b = await fetch("/banknifty").then(r=>r.json());
    let s = await fetch("/sensex").then(r=>r.json());
    let f = await fetch("/finnifty").then(r=>r.json());
    let m = await fetch("/midcap").then(r=>r.json());

    document.getElementById("nifty").innerHTML = format(n,"NIFTY");
    document.getElementById("bank").innerHTML = format(b,"BANKNIFTY");
    document.getElementById("sensex").innerHTML = format(s,"SENSEX");
    document.getElementById("fin").innerHTML = format(f,"FINNIFTY");
    document.getElementById("mid").innerHTML = format(m,"MIDCAP");
}

setInterval(load,8000);
load();

</script>

</body>
</html>
