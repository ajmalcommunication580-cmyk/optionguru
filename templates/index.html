<!DOCTYPE html>
<html>
<head>
<title>OptionGuru PRO</title>

<style>
body {
    background:#0b0f19;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.box {
    background:#111827;
    margin:10px;
    padding:15px;
    border-radius:10px;
    width:200px;
}

.btn {
    padding:10px 15px;
    margin:5px;
    background:#00c853;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🚀 OptionGuru PRO (ULTRA AI)</h1>

<h3 id="marketStatus" style="color:yellow;"></h3>
<h4 id="timer" style="color:cyan;"></h4>

<div class="container">
    <div id="niftyBox" class="box">Loading...</div>
    <div id="bankBox" class="box">Loading...</div>
    <div id="sensexBox" class="box">Loading...</div>
    <div id="finBox" class="box">Loading...</div>
    <div id="midBox" class="box">Loading...</div>
    <div id="optionBox" class="box">Option AI Loading...</div>
</div>

<script>

function color(signal){
    if(signal?.includes("BUY")) return "lime";
    if(signal?.includes("SELL")) return "red";
    return "yellow";
}

// 🔊 sound
function playSound(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/beep-01a.mp3");
    audio.play();
}

let lastSignal = "";

async function fetchData() {

    let nifty = await fetch('/nifty').then(r=>r.json());
    let bank = await fetch('/banknifty').then(r=>r.json());
    let sensex = await fetch('/sensex').then(r=>r.json());
    let fin = await fetch('/finnifty').then(r=>r.json());
    let mid = await fetch('/midcap').then(r=>r.json());
    let option = await fetch('/option').then(r=>r.json());

    // 🔥 Market Status
    if(nifty.signal?.includes("STRONG BUY")){
        marketStatus.innerHTML = "Market: STRONG BULLISH 🚀";
    }
    else if(nifty.signal?.includes("BUY")){
        marketStatus.innerHTML = "Market: BULLISH 📈";
    }
    else if(nifty.signal?.includes("SELL")){
        marketStatus.innerHTML = "Market: BEARISH 📉";
    }
    else{
        marketStatus.innerHTML = "Market: SIDEWAYS ⚖️";
    }

    // 🔔 Alert
    if(nifty.signal?.includes("STRONG") && lastSignal !== nifty.signal){
        alert("🔥 STRONG SIGNAL: " + nifty.signal);
        playSound();
        lastSignal = nifty.signal;
    }

    // 📊 BOXES (FULL DATA)
    function render(name,data){
        return `${name}<br>
        Price: ${data.price || "-"}<br>
        <span style="color:${color(data.signal)}">${data.signal || "-"}</span><br>
        Trend: ${data.trend || "-"}<br>
        Risk: ${data.risk || "-"}<br>
        Confidence: ${data.confidence || "-"}%<br>
        SL: ${data.sl || "-"} | Target: ${data.target || "-"}`;
    }

    niftyBox.innerHTML = render("NIFTY",nifty);
    bankBox.innerHTML = render("BANKNIFTY",bank);
    sensexBox.innerHTML = render("SENSEX",sensex);
    finBox.innerHTML = render("FINNIFTY",fin);
    midBox.innerHTML = render("MIDCAP",mid);

    // 🔥 OPTION AI
    optionBox.innerHTML = `OPTION AI<br>
    Price: ${option.price}<br>
    CE: ${option.ce} | PE: ${option.pe}<br>
    ${option.direction}<br>
    <span style="color:${option.entry?.includes("CE")?"lime":"red"}">
    Entry: ${option.entry}
    </span>`;
}

// ⏱ Timer Fix
let seconds = 5;
setInterval(()=>{
    document.getElementById("timer").innerHTML = "Refresh in: " + seconds + " sec";
    seconds--;
    if(seconds < 0) seconds = 5;
},1000);

// 🔄 Auto Refresh
setInterval(fetchData, 5000);
fetchData();

</script>

</body>
</html>
