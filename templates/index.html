<!DOCTYPE html>
<html>
<head>
<title>OptionGuru TRADER MODE</title>

<style>
body { background:#0b1622; color:white; font-family:Arial; text-align:center; }
.card { background:#162536; padding:20px; margin:10px; display:inline-block; border-radius:10px; width:200px; }
h2 { color:#00ffd5; }
</style>

</head>

<body>

<h1>💰 OptionGuru TRADER MODE</h1>

<div id="cards"></div>

<script>
const indices = ["nifty","banknifty","sensex","finnifty","midcap"];

function loadData() {
    indices.forEach(i => {
        fetch("/"+i)
        .then(res => res.json())
        .then(data => {

            let card = `
            <div class="card">
                <h2>${i.toUpperCase()}</h2>
                ${data.signal} | ${data.prediction}<br><br>
                Entry: ${data.entry}<br>
                SL: ${data.sl}<br>
                Target: ${data.target}<br>
                Support: ${data.support}<br>
                Resistance: ${data.resistance}
            </div>`;

            document.getElementById("cards").innerHTML += card;
        });
    });
}

setInterval(() => {
    document.getElementById("cards").innerHTML = "";
    loadData();
}, 3000);

loadData();
</script>

</body>
</html>
