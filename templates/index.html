<!DOCTYPE html>
<html>
<head>
<title>OptionGuru PRO</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { background:#0d1117; color:white; font-family:Arial; text-align:center; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.card {
    background:#161b22;
    padding:15px;
    margin:10px;
    border-radius:10px;
    width:200px;
}
button { margin:5px; padding:10px; }
#chart { height:500px; }
</style>
</head>

<body>

<h1>🚀 OptionGuru PRO</h1>

<div class="container">
<div class="card" id="niftyBox">NIFTY</div>
<div class="card" id="bankBox">BANKNIFTY</div>
<div class="card" id="sensexBox">SENSEX</div>
<div class="card" id="finBox">FINNIFTY</div>
<div class="card" id="midBox">MIDCAP</div>
</div>

<div>
<button onclick="loadChart('NSE:NIFTY50')">NIFTY</button>
<button onclick="loadChart('NSE:BANKNIFTY')">BANKNIFTY</button>
<button onclick="loadChart('BSE:SENSEX')">SENSEX</button>
</div>

<div id="chart"></div>

<script>
function loadChart(symbol){
    document.getElementById("chart").innerHTML="";
    new TradingView.widget({
        "container_id": "chart",
        "width": "100%",
        "height": 500,
        "symbol": symbol,
        "interval": "5",
        "theme": "dark"
    });
}

loadChart("NSE:NIFTY50");

// 🔥 Data Load
async function loadData(){
    let nifty = await fetch("/nifty").then(r=>r.json());
    let bank = await fetch("/banknifty").then(r=>r.json());
    let sensex = await fetch("/sensex").then(r=>r.json());
    let fin = await fetch("/finnifty").then(r=>r.json());
    let mid = await fetch("/midcap").then(r=>r.json());

    document.getElementById("niftyBox").innerHTML = `NIFTY<br>${nifty.price}<br>${nifty.signal}`;
    document.getElementById("bankBox").innerHTML = `BANKNIFTY<br>${bank.price}<br>${bank.signal}`;
    document.getElementById("sensexBox").innerHTML = `SENSEX<br>${sensex.price}<br>${sensex.signal}`;
    document.getElementById("finBox").innerHTML = `FINNIFTY<br>${fin.price}<br>${fin.signal}`;
    document.getElementById("midBox").innerHTML = `MIDCAP<br>${mid.price}<br>${mid.signal}`;
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
