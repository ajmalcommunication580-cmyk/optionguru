<!DOCTYPE html>
<html>
<head>
<title>OptionGuru PRO</title>

<style>
body {
    background:#0b0f19;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.box {
    background:#111827;
    margin:10px;
    padding:15px;
    border-radius:10px;
    width:200px;
}

.btn {
    padding:10px 15px;
    margin:5px;
    background:#00c853;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover {
    background:#009624;
}
</style>
</head>

<body>

<h1>🚀 OptionGuru PRO (ULTRA AI)</h1>

<!-- 🔥 MARKET STATUS -->
<h3 id="marketStatus" style="color:yellow;"></h3>

<!-- 🔥 TIMER -->
<h4 id="timer" style="color:cyan;"></h4>

<div class="container">
    <div id="niftyBox" class="box">Loading...</div>
    <div id="bankBox" class="box">Loading...</div>
    <div id="sensexBox" class="box">Loading...</div>
    <div id="finBox" class="box">Loading...</div>
    <div id="midBox" class="box">Loading...</div>

    <!-- 🔥 OPTION AI BOX -->
    <div id="optionBox" class="box">Option AI Loading...</div>
</div>

<!-- BUTTONS -->
<div>
    <button class="btn" onclick="changeChart('NSE:BANKNIFTY')">BANKNIFTY</button>
    <button class="btn" onclick="changeChart('NSE:NIFTY')">NIFTY</button>
    <button class="btn" onclick="changeChart('BSE:SENSEX')">SENSEX</button>
    <button class="btn" onclick="changeChart('NSE:FINNIFTY')">FINNIFTY</button>
    <button class="btn" onclick="changeChart('NSE:NIFTY_MIDCAP_50')">MIDCAP</button>
</div>

<!-- CHART -->
<div style="height:500px; margin-top:20px;">
    <iframe id="chartFrame"
        src="https://www.tradingview.com/widgetembed/?symbol=NSE:BANKNIFTY&interval=5&theme=dark"
        style="width:100%; height:100%; border:none;">
    </iframe>
</div>

<script>

// 🔥 CHART CHANGE
function changeChart(symbol) {
    document.getElementById("chartFrame").src =
    `https://www.tradingview.com/widgetembed/?symbol=${symbol}&interval=5&theme=dark`;
}

// 🎨 COLOR
function color(signal){
    if(signal.includes("BUY")) return "lime";
    if(signal.includes("SELL")) return "red";
    return "yellow";
}

// 🔊 SOUND ALERT
function playSound(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/beep-01a.mp3");
    audio.play();
}

// 📊 FETCH DATA
async function fetchData() {

    let nifty = await fetch('/nifty').then(r=>r.json());
    let bank = await fetch('/banknifty').then(r=>r.json());
    let sensex = await fetch('/sensex').then(r=>r.json());
    let fin = await fetch('/finnifty').then(r=>r.json());
    let mid = await fetch('/midcap').then(r=>r.json());
    let option = await fetch('/option').then(r=>r.json());

    // 🔥 MARKET STATUS
    if(nifty.signal.includes("BUY")){
        document.getElementById("marketStatus").innerHTML = "Market: BULLISH 📈";
    } else {
        document.getElementById("marketStatus").innerHTML = "Market: BEARISH 📉";
    }

    // 🔔 SIGNAL ALERT
    if(nifty.signal.includes("STRONG")){
        alert("🔥 STRONG SIGNAL ALERT: " + nifty.signal);
        playSound();
    }

    document.getElementById("niftyBox").innerHTML =
    `NIFTY<br>Price: ${nifty.price}<br>
    <span style="color:${color(nifty.signal)}">${nifty.signal}</span>`;

    document.getElementById("bankBox").innerHTML =
    `BANKNIFTY<br>Price: ${bank.price}<br>
    <span style="color:${color(bank.signal)}">${bank.signal}</span>`;

    document.getElementById("sensexBox").innerHTML =
    `SENSEX<br>Price: ${sensex.price}<br>
    <span style="color:${color(sensex.signal)}">${sensex.signal}</span>`;

    document.getElementById("finBox").innerHTML =
    `FINNIFTY<br>Price: ${fin.price}<br>
    <span style="color:${color(fin.signal)}">${fin.signal}</span>`;

    document.getElementById("midBox").innerHTML =
    `MIDCAP<br>Price: ${mid.price}<br>
    <span style="color:${color(mid.signal)}">${mid.signal}</span>`;

    // 🔥 OPTION AI BOX
    document.getElementById("optionBox").innerHTML =
    `OPTION AI<br>
    Price: ${option.price}<br>
    CE: ${option.ce} | PE: ${option.pe}<br>
    ${option.direction}<br>
    Entry: ${option.entry}`;
}

// ⏱ TIMER
let seconds = 5;
setInterval(()=>{
    seconds--;
    document.getElementById("timer").innerHTML = "Refresh in: " + seconds + " sec";
    if(seconds == 0) seconds = 5;
},1000);

// 🔄 AUTO REFRESH
setInterval(fetchData, 5000);
fetchData();

</script>

</body>
</html>
