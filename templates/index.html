<!DOCTYPE html>
<html>
<head>
<title>OptionGuru Hooriya</title>
<style>
body { background:#0d1117; color:white; text-align:center; font-family:Arial; }
.card { margin:20px auto; padding:20px; width:320px; border-radius:10px; background:#161b22; }
.signal { font-size:16px; margin-top:10px; line-height:1.6; }
</style>
</head>

<body>

<h1>🚀 OptionGuru Hooriya (AI Version)</h1>

<div class="card">
    <h2>NIFTY</h2>
    <div class="signal" id="nifty">Loading...</div>
</div>

<div class="card">
    <h2>BANK NIFTY</h2>
    <div class="signal" id="bank">Loading...</div>
</div>

<div id="chart" style="margin-top:30px;"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 400,
  "symbol": "NSE:NIFTY50",   // ✅ FIXED SYMBOL
  "interval": "5",
  "theme": "dark",
  "container_id": "chart"
});
</script>

<script>
let lastSignal = "";

async function loadData(){
    try {
        let n = await fetch("/nifty").then(r=>r.json());
        let b = await fetch("/banknifty").then(r=>r.json());

        // ❌ Fallback detect
        if(n.prediction === "Fallback Mode"){
            document.getElementById("nifty").innerText = "⚠️ Data Limit... wait...";
        } else {
            document.getElementById("nifty").innerText =
                n.signal + " | " + n.prediction + 
                " | Entry: " + n.entry + " | SL: " + n.sl + " | Target: " + n.target;
        }

        if(b.prediction === "Fallback Mode"){
            document.getElementById("bank").innerText = "⚠️ Data Limit... wait...";
        } else {
            document.getElementById("bank").innerText =
                b.signal + " | " + b.prediction + 
                " | Entry: " + b.entry + " | SL: " + b.sl + " | Target: " + b.target;
        }

        // 🔔 Notification logic
        let currentSignal = n.signal;

        if(currentSignal !== lastSignal){

    // ✅ Sirf STRONG signals pe notify
    if(
        currentSignal.includes("STRONG BUY") || 
        currentSignal.includes("STRONG SELL")
    ){
        notify(currentSignal);
    }

    lastSignal = currentSignal;
}
        }

    } catch (err) {
        console.log("Error:", err);
    }
}

function notify(msg){
    if(Notification.permission === "granted"){
        new Notification("🚀 AI Signal", { body: msg });
    }
}

if (Notification.permission !== "granted"){
    Notification.requestPermission();
}

// ⛔ IMPORTANT: Slow refresh (15 sec)
setInterval(loadData, 45000);

// First load
loadData();
</script>

</body>
</html>
