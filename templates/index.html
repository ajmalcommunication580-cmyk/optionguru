<!DOCTYPE html>
<html>
<head>
<title>OptionGuru PRO</title>
    <h3 id="marketStatus" style="text-align:center; color:yellow;"></h3>

<style>
body {
    background:#0b0f19;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.box {
    background:#111827;
    margin:10px;
    padding:15px;
    border-radius:10px;
    width:200px;
}

.btn {
    padding:10px 15px;
    margin:5px;
    background:#00c853;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover {
    background:#009624;
}
</style>
</head>

<body>

<h1>🚀 OptionGuru PRO (ULTRA AI)</h1>

<div class="container">
    <div id="niftyBox" class="box">Loading...</div>
    <div id="bankBox" class="box">Loading...</div>
    <div id="sensexBox" class="box">Loading...</div>
    <div id="finBox" class="box">Loading...</div>
    <div id="midBox" class="box">Loading...</div>
</div>

<!-- BUTTONS -->
<div>
    <button class="btn" onclick="changeChart('NSE:BANKNIFTY')">BANKNIFTY</button>
    <button class="btn" onclick="changeChart('NSE:NIFTY')">NIFTY</button>
    <button class="btn" onclick="changeChart('BSE:SENSEX')">SENSEX</button>
    <button class="btn" onclick="changeChart('NSE:FINNIFTY')">FINNIFTY</button>
    <button class="btn" onclick="changeChart('NSE:NIFTY_MIDCAP_50')">MIDCAP</button>
</div>

<!-- 🔥 STABLE CHART -->
<div id="chartBox" style="height:500px; margin-top:20px;">
    <iframe id="chartFrame"
        src="https://www.tradingview.com/widgetembed/?symbol=NSE:BANKNIFTY&interval=5&theme=dark"
        style="width:100%; height:100%; border:none;">
    </iframe>
</div>

<script>
// 🔥 Chart Change (NO ERROR)
function changeChart(symbol) {
    document.getElementById("chartFrame").src =
    `https://www.tradingview.com/widgetembed/?symbol=${symbol}&interval=5&theme=dark`;
}

// 🎨 Color
function color(signal){
    if(signal.includes("BUY")) return "lime";
    if(signal.includes("SELL")) return "red";
    return "yellow";
}

// 📊 Fetch Data
async function fetchData() {

    let nifty = await fetch('/nifty').then(res=>res.json());
    let bank = await fetch('/banknifty').then(res=>res.json());
    let sensex = await fetch('/sensex').then(res=>res.json());
    let fin = await fetch('/finnifty').then(res=>res.json());
    let mid = await fetch('/midcap').then(res=>res.json());

    document.getElementById("niftyBox").innerHTML =
    `NIFTY<br>
    Price: ${nifty.price}<br>
    <span style="color:${color(nifty.signal)}">${nifty.signal}</span><br>
    Trend: ${nifty.trend}<br>
    Risk: ${nifty.risk}<br>
    Confidence: ${nifty.confidence}%<br>
    SL: ${nifty.sl} | Target: ${nifty.target}`;

    document.getElementById("bankBox").innerHTML =
    `BANKNIFTY<br>
    Price: ${bank.price}<br>
    <span style="color:${color(bank.signal)}">${bank.signal}</span><br>
    Trend: ${bank.trend}<br>
    Risk: ${bank.risk}<br>
    Confidence: ${bank.confidence}%<br>
    SL: ${bank.sl} | Target: ${bank.target}`;

    document.getElementById("sensexBox").innerHTML =
    `SENSEX<br>
    Price: ${sensex.price}<br>
    <span style="color:${color(sensex.signal)}">${sensex.signal}</span><br>
    Trend: ${sensex.trend}<br>
    Risk: ${sensex.risk}<br>
    Confidence: ${sensex.confidence}%<br>
    SL: ${sensex.sl} | Target: ${sensex.target}`;

    document.getElementById("finBox").innerHTML =
    `FINNIFTY<br>
    Price: ${fin.price}<br>
    <span style="color:${color(fin.signal)}">${fin.signal}</span><br>
    Trend: ${fin.trend}<br>
    Risk: ${fin.risk}<br>
    Confidence: ${fin.confidence}%<br>
    SL: ${fin.sl} | Target: ${fin.target}`;

    document.getElementById("midBox").innerHTML =
    `MIDCAP<br>
    Price: ${mid.price}<br>
    <span style="color:${color(mid.signal)}">${mid.signal}</span><br>
    Trend: ${mid.trend}<br>
    Risk: ${mid.risk}<br>
    Confidence: ${mid.confidence}%<br>
    SL: ${mid.sl} | Target: ${mid.target}`;
}

// 🔄 AUTO REFRESH
setInterval(fetchData, 5000);
fetchData();
</script>

</body>
</html>
