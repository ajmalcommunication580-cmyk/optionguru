<!DOCTYPE html>
<html>
<head>
<title>OptionGuru Hooriya PRO</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
    background:#0d1117;
    color:white;
    text-align:center;
    font-family:Arial;
}

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    margin:15px;
    padding:15px;
    width:250px;
    border-radius:10px;
    background:#161b22;
}

.signal {
    margin-top:10px;
    line-height:1.5;
    font-size:14px;
}
</style>
</head>

<body>

<h1>🚀 OptionGuru Hooriya PRO</h1>

<div class="container">
<div class="card"><h3>NIFTY</h3><div id="nifty"></div></div>
<div class="card"><h3>BANKNIFTY</h3><div id="bank"></div></div>
<div class="card"><h3>SENSEX</h3><div id="sensex"></div></div>
<div class="card"><h3>FINNIFTY</h3><div id="fin"></div></div>
<div class="card"><h3>MIDCAP</h3><div id="mid"></div></div>
</div>

<div id="chart" style="height:500px;"></div>

<script>

// 📊 TradingView Chart
new TradingView.widget({
  "width": "100%",
  "height": 500,
  "symbol": "NSE:NIFTY",
  "interval": "5",
  "timezone": "Asia/Kolkata",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "container_id": "chart"
});


// 📡 Fetch Data
async function loadData(){

    let n = await fetch("/nifty").then(r=>r.json());
    let b = await fetch("/banknifty").then(r=>r.json());
    let s = await fetch("/sensex").then(r=>r.json());
    let f = await fetch("/finnifty").then(r=>r.json());
    let m = await fetch("/midcap").then(r=>r.json());

    function format(x){
        return x.signal + " | " + x.prediction +
        "<br>Entry: " + x.entry +
        "<br>SL: " + x.sl +
        "<br>Target: " + x.target;
    }

    document.getElementById("nifty").innerHTML = format(n);
    document.getElementById("bank").innerHTML = format(b);
    document.getElementById("sensex").innerHTML = format(s);
    document.getElementById("fin").innerHTML = format(f);
    document.getElementById("mid").innerHTML = format(m);
}

// ⏱ auto refresh
setInterval(loadData, 15000);
loadData();

</script>

</body>
</html>
