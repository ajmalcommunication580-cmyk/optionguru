<!DOCTYPE html>
<html>
<head>
    <title>OptionGuru TRADER MODE</title>
    <style>
        body {
            background: #0b1320;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
        }

        .box {
            background: #111c2e;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
        }

        h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1>💰 OptionGuru TRADER MODE</h1>

<div class="container">
    <div class="box" id="nifty"></div>
    <div class="box" id="banknifty"></div>
    <div class="box" id="sensex"></div>
    <div class="box" id="finnifty"></div>
    <div class="box" id="midcap"></div>
</div>

<script>
async function loadData(id, url) {
    try {
        let res = await fetch(url);
        let data = await res.json();

        document.getElementById(id).innerHTML = `
            <h2>${id.toUpperCase()}</h2>
            <p>${data.signal} | ${data.prediction}</p>
            <p>Entry: ${data.entry}</p>
            <p>SL: ${data.sl}</p>
            <p>Target: ${data.target}</p>
            <p>Support: ${data.support}</p>
            <p>Resistance: ${data.resistance}</p>
        `;
    } catch (e) {
        document.getElementById(id).innerHTML = `<h2>${id}</h2><p>Error</p>`;
    }
}

function refresh() {
    loadData("nifty", "/nifty");
    loadData("banknifty", "/banknifty");
    loadData("sensex", "/sensex");
    loadData("finnifty", "/finnifty");
    loadData("midcap", "/midcap");
}

// 🔥 Auto refresh every 5 sec
setInterval(refresh, 5000);
refresh();
</script>

</body>
</html>
