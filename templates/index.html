<!DOCTYPE html>
<html>
<head>
    <title>OptionGuru Hooriya</title>
    <style>
        body { background: #0f172a; color: white; font-family: Arial; text-align: center; }
        .box { border: 1px solid #333; padding: 15px; margin: 10px; border-radius: 10px; }
    </style>
</head>

<body>

<h1>🚀 OptionGuru Hooriya</h1>

<div class="box" id="nifty">Loading NIFTY...</div>
<div class="box" id="banknifty">Loading BANKNIFTY...</div>

<h2>📊 Live NIFTY Chart</h2>

<iframe 
    src="https://www.tradingview.com/widgetembed/?symbol=NSE:NIFTY&interval=5&theme=dark"
    width="100%" height="400">
</iframe>

<script>
async function loadData() {
    let n = await fetch('/nifty').then(r => r.json());
    let b = await fetch('/banknifty').then(r => r.json());

    document.getElementById('nifty').innerHTML =
        `NIFTY<br>${n.signal} | ${n.prediction}`;

    document.getElementById('banknifty').innerHTML =
        `BANKNIFTY<br>${b.signal} | ${b.prediction}`;
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
