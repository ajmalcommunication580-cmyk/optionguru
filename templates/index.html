<!DOCTYPE html>
<html>
<head>
<title>OptionGuru PRO</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {background:#0d1117;color:white;text-align:center;}
.card {background:#161b22;padding:15px;margin:10px;border-radius:10px;width:260px;}
.container {display:flex;flex-wrap:wrap;justify-content:center;}
button {margin:5px;padding:10px;border:none;border-radius:5px;background:#238636;color:white;}
</style>
</head>

<body>

<h1>🚀 OptionGuru PRO</h1>

<div class="container">
<div class="card"><h3>NIFTY</h3><div id="nifty"></div></div>
<div class="card"><h3>BANKNIFTY</h3><div id="bank"></div></div>
<div class="card"><h3>SENSEX</h3><div id="sensex"></div></div>
<div class="card"><h3>FINNIFTY</h3><div id="fin"></div></div>
<div class="card"><h3>MIDCAP</h3><div id="mid"></div></div>
</div>

<!-- 🔥 DEMAT STYLE CHART -->
<div>
<button onclick="changeChart('NSE:NIFTY')">NIFTY</button>
<button onclick="changeChart('NSE:BANKNIFTY')">BANKNIFTY</button>
<button onclick="changeChart('BSE:SENSEX')">SENSEX</button>
<button onclick="changeChart('NSE:FINNIFTY')">FINNIFTY</button>
<button onclick="changeChart('NSE:MIDCPNIFTY')">MIDCAP</button>
</div>

<div id="chart" style="height:500px;"></div>

<script>

function loadChart(symbol){
    new TradingView.widget({
        "symbol": symbol,
        "interval": "5",
        "theme": "dark",
        "container_id": "chart"
    });
}

loadChart("NSE:NIFTY");

function changeChart(symbol){
    document.getElementById("chart").innerHTML = "";
    loadChart(symbol);
}

// 📊 SIGNAL LOAD
async function load(){

    let n = await fetch("/nifty").then(r=>r.json());
    let b = await fetch("/banknifty").then(r=>r.json());
    let s = await fetch("/sensex").then(r=>r.json());
    let f = await fetch("/finnifty").then(r=>r.json());
    let m = await fetch("/midcap").then(r=>r.json());

    document.getElementById("nifty").innerHTML = JSON.stringify(n,null,1);
    document.getElementById("bank").innerHTML = JSON.stringify(b,null,1);
    document.getElementById("sensex").innerHTML = JSON.stringify(s,null,1);
    document.getElementById("fin").innerHTML = JSON.stringify(f,null,1);
    document.getElementById("mid").innerHTML = JSON.stringify(m,null,1);
}

setInterval(load,8000);
load();

</script>

</body>
</html>
