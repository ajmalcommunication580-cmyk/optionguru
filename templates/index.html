<!DOCTYPE html>
<html>
<head>
<title>OptionGuru Hooriya</title>

<script>
async function loadData() {

    let nifty = await fetch('/nifty').then(r => r.json());
    let bank = await fetch('/banknifty').then(r => r.json());

    update("nifty", nifty);
    update("bank", bank);
}

function update(id, data) {
    document.getElementById(id).innerHTML = `
        <h3>${data.signal} | ${data.prediction}</h3>
        Entry: ${data.entry}<br>
        SL: ${data.sl}<br>
        Target: ${data.target}<br>
        Support: ${data.support}<br>
        Resistance: ${data.resistance}
    `;
}

setInterval(loadData, 5000);
</script>

<style>
body {
    background:#0b1220;
    color:white;
    font-family:Arial;
    text-align:center;
}
.box {
    display:inline-block;
    margin:20px;
    padding:20px;
    background:#162034;
    border-radius:10px;
    width:250px;
}
</style>

</head>

<body>

<h1>🚀 OptionGuru Hooriya FINAL</h1>

<div class="box" id="nifty">Loading...</div>

</body>
</html>
