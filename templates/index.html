<!DOCTYPE html>
<html>
<head>
<title>OptionGuru Hooriya PRO</title>

<style>
body {
    background:#0d1117;
    color:white;
    text-align:center;
    font-family:Arial;
}

h1 {
    margin-top:20px;
}

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    margin:15px;
    padding:20px;
    width:300px;
    border-radius:12px;
    background:#161b22;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.signal {
    font-size:15px;
    margin-top:10px;
    line-height:1.6;
}

.buy { color:#00ff9c; }
.sell { color:#ff4d4d; }
.wait { color:#f1c40f; }
</style>

</head>

<body>

<h1>🚀 OptionGuru Hooriya PRO</h1>

<div class="container">

<div class="card">
    <h2>NIFTY</h2>
    <div class="signal" id="nifty">Loading...</div>
</div>

<div class="card">
    <h2>BANK NIFTY</h2>
    <div class="signal" id="bank">Loading...</div>
</div>

<div class="card">
    <h2>SENSEX</h2>
    <div class="signal" id="sensex">Loading...</div>
</div>

<div class="card">
    <h2>FINNIFTY</h2>
    <div class="signal" id="finnifty">Loading...</div>
</div>

<div class="card">
    <h2>MIDCAP</h2>
    <div class="signal" id="midcap">Loading...</div>
</div>

</div>

<div id="chart" style="margin-top:30px;"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 400,
  "symbol": "NSE:NIFTY50",
  "interval": "5",
  "theme": "dark",
  "container_id": "chart"
});
</script>

<script>

async function fetchData(endpoint, elementId){
    try {
        let data = await fetch(endpoint).then(r=>r.json());

        let signalClass = "wait";
        if(data.signal.includes("BUY")) signalClass = "buy";
        if(data.signal.includes("SELL")) signalClass = "sell";

        document.getElementById(elementId).innerHTML =
            `<span class="${signalClass}">
            ${data.signal} | ${data.prediction} <br>
            Entry: ${data.entry} <br>
            SL: ${data.sl} <br>
            Target: ${data.target}
            </span>`;

    } catch(e){
        document.getElementById(elementId).innerText = "⚠️ Error loading data";
    }
}

async function loadAll(){
    fetchData("/nifty", "nifty");
    fetchData("/banknifty", "bank");
    fetchData("/sensex", "sensex");
    fetchData("/finnifty", "finnifty");
    fetchData("/midcap", "midcap");
}

// 🔁 Refresh every 30 sec (stable)
setInterval(loadAll, 30000);

// First load
loadAll();

</script>

</body>
</html>
