<!DOCTYPE html>
<html>
<head>
<title>OptionGuru Hooriya AI PRO</title>
<style>
body { background:#0d1117; color:white; text-align:center; font-family:Arial; }
.card { margin:15px auto; padding:15px; width:320px; background:#161b22; border-radius:10px; }
</style>
</head>
<body>

<h1>🚀 AI TRADING DASHBOARD</h1>

<div class="card"><div id="nifty"></div></div>
<div class="card"><div id="banknifty"></div></div>
<div class="card"><div id="sensex"></div></div>
<div class="card"><div id="finnifty"></div></div>
<div class="card"><div id="midcap"></div></div>

<h2>📊 OPTION CHAIN</h2>
<div class="card"><div id="opt_nifty"></div></div>
<div class="card"><div id="opt_banknifty"></div></div>

<script>
function update(symbol,id){
 fetch('/'+symbol).then(r=>r.json()).then(d=>{
  document.getElementById(id).innerHTML=
  `<b>${symbol}</b><br>
  ${d.signal}<br>
  Entry:${d.entry}<br>
  SL:${d.sl}<br>
  Target:${d.target}<br>
  RSI:${d.rsi}<br>
  Confidence:${d.confidence}%`;
 });
}

function opt(symbol,id){
 fetch('/option/'+symbol).then(r=>r.json()).then(d=>{
  document.getElementById(id).innerHTML=
  `<b>${symbol} OPTION</b><br>
  ${d.signal}<br>
  CE:${d.ce}<br>
  PE:${d.pe}`;
 });
}

setInterval(()=>{
 update('nifty','nifty');
 update('banknifty','banknifty');
 update('sensex','sensex');
 update('finnifty','finnifty');
 update('midcap','midcap');

 opt('nifty','opt_nifty');
 opt('banknifty','opt_banknifty');
},3000);
</script>

</body>
</html>
